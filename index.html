<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TCG Pocket V3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

/* HEADER */
header{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:#fff;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
}

/* BUTTON */
button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#111;
color:#fff;
cursor:pointer;
}

/* BOOSTER AREA */
.pack{
display:flex;
justify-content:center;
gap:10px;
margin-top:30px;
flex-wrap:wrap;
}

.card{
width:120px;
height:170px;
border-radius:12px;
background:#222;
color:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
transform:scale(0.8);
opacity:0;
transition:0.4s;
}

.card.show{
transform:scale(1);
opacity:1;
}

.card-inner{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
transition:0.8s;
}

.card.flip{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.back{
background:#fff;
color:#000;
transform:rotateY(180deg);
overflow:hidden;
}

.back img{
width:100%;
height:90px;
object-fit:cover;
}

/* RARITY EFFECTS */
.r5{
box-shadow:0 0 15px orange;
animation:shine 1.2s infinite;
}

.r6{
box-shadow:0 0 20px gold;
animation:sparkle 1s infinite;
}

@keyframes shine{
0%{filter:brightness(1)}
50%{filter:brightness(1.6)}
100%{filter:brightness(1)}
}

@keyframes sparkle{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* COLLECTION */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,100px);
gap:10px;
padding:10px;
}

.small{
background:#fff;
border:1px solid #ddd;
border-radius:10px;
text-align:center;
padding:5px;
}

.locked{
background:#eee;
color:#aaa;
}

/* ADMIN */
.adminCard{
background:#fff;
padding:10px;
margin:10px;
border-radius:10px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<header>
<button onclick="nav('b')">Booster</button>
<button onclick="nav('c')">Collection</button>
<button onclick="nav('a')">Admin</button>
</header>

<!-- BOOSTER -->
<div id="b">

<button onclick="openPack()">Ouvrir booster</button>
<p id="cd"></p>

<div id="pack" class="pack"></div>

</div>

<!-- COLLECTION -->
<div id="c" style="display:none">
<h2>Collection</h2>
<div id="grid" class="grid"></div>
</div>

<!-- ADMIN -->
<div id="a" style="display:none">
<h2>Admin</h2>

<input id="name" placeholder="Nom"><br>
<input id="index" placeholder="Index"><br>

<select id="rarity">
<option value="1">R1</option>
<option value="2">R2</option>
<option value="3">R3</option>
<option value="4">R4</option>
<option value="5">R5</option>
<option value="6">R6</option>
</select><br>

<input type="file" id="img"><br>

<button onclick="addCard()">Ajouter</button>

<div id="list"></div>

</div>

<script>

/* DATA */
let cards = JSON.parse(localStorage.getItem("cards")||"[]");
let col = JSON.parse(localStorage.getItem("col")||"{}");
let last = localStorage.getItem("last")||0;

/* AUDIO */
const openSnd = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-game-show-suspense-waiting-667.mp3");
const rareSnd = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.wav");

/* NAV */
function nav(x){
document.getElementById("b").style.display = x=="b"?"block":"none";
document.getElementById("c").style.display = x=="c"?"block":"none";
document.getElementById("a").style.display = x=="a"?"block":"none";
render();
admin();
}

/* ROLL */
function roll(){
let r=Math.random();
if(r<0.5)return 1;
if(r<0.75)return 2;
if(r<0.88)return 3;
if(r<0.95)return 4;
if(r<0.99)return 5;
return 6;
}

/* BOOSTER FIX */
function openPack(){

let now=Date.now();
if(now-last<20000){
document.getElementById("cd").innerText="Cooldown "+Math.ceil((20000-(now-last))/1000)+"s";
return;
}

last=now;
localStorage.setItem("last",last);

openSnd.play();

let pack=document.getElementById("pack");
pack.innerHTML="";

let booster=[];

/* FIX IMPORTANT BUG: cards bien filtrées */
for(let i=0;i<5;i++){
let r=roll();
let pool=cards.filter(c=>c.r==r);
if(pool.length){
booster.push(pool[Math.floor(Math.random()*pool.length)]);
}
}

/* DISPLAY 5 CARDS */
booster.forEach((c,i)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-inner" id="ci${i}">
<div class="face front">CARTE</div>
<div class="face back ${"r"+c.r}">
<img src="${c.img}">
<h4>${c.n}</h4>
<p>#${c.i}</p>
</div>
</div>
`;

pack.appendChild(div);

/* ANIMATION SEQUENCE */
setTimeout(()=>{
div.classList.add("show");
},i*200);

/* FLIP + REVEAL */
setTimeout(()=>{
document.getElementById("ci"+i).classList.add("flip");

/* SAVE COLLECTION */
col[c.i]=c;
localStorage.setItem("col",JSON.stringify(col));

/* SOUND + EFFECT */
if(c.r>=5){
rareSnd.play();
div.style.transform="scale(1.2)";
div.style.filter="drop-shadow(0 0 10px gold)";
}

},600+i*400);

});

}

/* COLLECTION */
function render(){
let g=document.getElementById("grid");
if(!g) return;
g.innerHTML="";

cards.forEach(c=>{

let owned=col[c.i];

let d=document.createElement("div");
d.className="small "+(owned?"":"locked");

d.innerHTML=owned?
`<img src="${c.img}" width="80"><br>${c.n}`:
"???";

g.appendChild(d);
});

}

/* ADMIN FIX (IMPORTANT) */
function addCard(){

let n=document.getElementById("name").value;
let i=document.getElementById("index").value;
let r=parseInt(document.getElementById("rarity").value);
let file=document.getElementById("img").files[0];

if(!file) return;

let fr=new FileReader();

fr.onload=e=>{

cards.push({
n,i,r,
img:e.target.result
});

localStorage.setItem("cards",JSON.stringify(cards));
admin();

};

fr.readAsDataURL(file);

}

function admin(){
let d=document.getElementById("list");
if(!d) return;

d.innerHTML="";

cards.forEach((c,i)=>{
d.innerHTML+=`
<div class="adminCard">
<img src="${c.img}" width="80"><br>
${c.n} | R${c.r} | #${c.i}
<br>
<button onclick="del(${i})">Suppr</button>
</div>`;
});
}

function del(i){
cards.splice(i,1);
localStorage.setItem("cards",JSON.stringify(cards));
admin();
}

nav("b");

</script>

</body>
</html>
