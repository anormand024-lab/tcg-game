<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TCG Booster Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: white;
    color: #111;
}

header {
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

button {
    padding: 10px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
}

button:hover {
    background: #f0f0f0;
}

.page {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    width: 200px;
    border: 1px solid #ddd;
    padding: 10px;
    margin: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.locked {
    background: #eee;
    color: #999;
}

.booster-container {
    text-align: center;
}

.swipe-box {
    width: 220px;
    margin: auto;
    border: 1px solid #ccc;
    padding: 10px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<header>
<button onclick="showPage('booster')">Booster</button>
<button onclick="showPage('collection')">Collection</button>
<button onclick="showPage('admin')">Admin</button>
</header>

<!-- BOOSTER -->
<div id="booster" class="page active">
    <h2>Ouverture de booster</h2>
    <button onclick="openBooster()">Ouvrir un booster</button>
    <p id="cooldownText"></p>

    <div id="boosterView" class="swipe-box hidden">
        <img id="bImg" width="200">
        <h3 id="bName"></h3>
        <p id="bInfo"></p>
        <button onclick="prevCard()">◀</button>
        <button onclick="nextCard()">▶</button>
    </div>
</div>

<!-- COLLECTION -->
<div id="collection" class="page">
    <h2>Collection</h2>
    <div id="collectionGrid"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
    <h2>Admin - Gestion cartes</h2>

    <input id="cardName" placeholder="Nom"><br><br>
    <input id="cardIndex" placeholder="Index collection"><br><br>
    <input id="cardRarity" type="number" min="1" max="6" placeholder="Rareté (1-6)"><br><br>
    <input type="file" id="cardImage"><br><br>

    <button onclick="addCard()">Ajouter carte</button>

    <h3>Cartes existantes</h3>
    <div id="adminList"></div>
</div>

<script>
/* ---------------- STORAGE ---------------- */
let cards = JSON.parse(localStorage.getItem("cards")) || [];
let collection = JSON.parse(localStorage.getItem("collection")) || {};
let lastBoost = localStorage.getItem("lastBoost") || 0;

/* ---------------- NAV ---------------- */
function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    renderCollection();
    renderAdmin();
}

/* ---------------- BOOSTER ---------------- */
let currentBooster = [];
let index = 0;

function rarityRoll(){
    let r = Math.random();
    if(r < 0.5) return 1;
    if(r < 0.75) return 2;
    if(r < 0.88) return 3;
    if(r < 0.95) return 4;
    if(r < 0.99) return 5;
    return 6;
}

function openBooster(){
    let now = Date.now();
    if(now - lastBoost < 20000){
        document.getElementById("cooldownText").innerText =
        "Cooldown actif: " + Math.ceil((20000 - (now - lastBoost))/1000) + "s";
        return;
    }

    lastBoost = now;
    localStorage.setItem("lastBoost", lastBoost);

    currentBooster = [];

    for(let i=0;i<5;i++){
        let rarity = rarityRoll();
        let pool = cards.filter(c => c.rarity == rarity);
        if(pool.length > 0){
            currentBooster.push(pool[Math.floor(Math.random()*pool.length)]);
        }
    }

    index = 0;
    showCard();
    document.getElementById("boosterView").classList.remove("hidden");
}

function showCard(){
    let c = currentBooster[index];
    if(!c) return;

    document.getElementById("bImg").src = c.image;
    document.getElementById("bName").innerText = c.name;
    document.getElementById("bInfo").innerText =
        "Rareté: " + c.rarity + " | Index: " + c.index;

    collection[c.index] = c;
    localStorage.setItem("collection", JSON.stringify(collection));
}

function nextCard(){
    if(index < currentBooster.length - 1){
        index++;
        showCard();
    }
}

function prevCard(){
    if(index > 0){
        index--;
        showCard();
    }
}

/* ---------------- COLLECTION ---------------- */
function renderCollection(){
    let div = document.getElementById("collectionGrid");
    div.innerHTML = "";

    cards.forEach(c => {
        let owned = collection[c.index];

        let el = document.createElement("div");
        el.className = "card";

        if(owned){
            el.innerHTML = `
                <img src="${c.image}">
                <h4>${c.name}</h4>
                <p>Rareté ${c.rarity}</p>
                <p>#${c.index}</p>
            `;
        } else {
            el.classList.add("locked");
            el.innerHTML = "<h3>???</h3>";
        }

        div.appendChild(el);
    });
}

/* ---------------- ADMIN ---------------- */
function addCard(){
    let name = document.getElementById("cardName").value;
    let index = document.getElementById("cardIndex").value;
    let rarity = document.getElementById("cardRarity").value;
    let file = document.getElementById("cardImage").files[0];

    let reader = new FileReader();
    reader.onload = function(e){
        cards.push({
            name,
            index,
            rarity,
            image: e.target.result
        });

        localStorage.setItem("cards", JSON.stringify(cards));
        renderAdmin();
    };

    reader.readAsDataURL(file);
}

function deleteCard(i){
    cards.splice(i,1);
    localStorage.setItem("cards", JSON.stringify(cards));
    renderAdmin();
}

function renderAdmin(){
    let div = document.getElementById("adminList");
    div.innerHTML = "";

    cards.forEach((c,i)=>{
        div.innerHTML += `
        <div class="card">
            <img src="${c.image}">
            <p>${c.name}</p>
            <p>#${c.index} | R${c.rarity}</p>
            <button onclick="deleteCard(${i})">Supprimer</button>
        </div>`;
    });
}
</script>

</body>
</html>
