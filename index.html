<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TCG Pocket Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#f7f7f7,#ffffff);
    color: #111;
}

/* HEADER */
header {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: white;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
}

button {
    padding: 10px 14px;
    border: none;
    background: #111;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    opacity: 0.85;
}

/* PAGES */
.page { display:none; padding:20px; }
.active { display:block; }

/* BOOSTER */
.booster-wrap {
    text-align: center;
    margin-top: 20px;
}

.card-stage {
    width: 260px;
    height: 360px;
    margin: 20px auto;
    perspective: 1000px;
}

.card {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    transform-style: preserve-3d;
    transition: transform 0.8s;
    position: relative;
}

.card.flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.front {
    background: #111;
    color: white;
}

.back {
    background: white;
    transform: rotateY(180deg);
    border: 1px solid #ddd;
}

.back img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
}

.rarity {
    font-weight: bold;
    margin-top: 5px;
}

/* rarity glow */
.r1 { box-shadow: 0 0 10px #aaa; }
.r2 { box-shadow: 0 0 12px #4caf50; }
.r3 { box-shadow: 0 0 14px #2196f3; }
.r4 { box-shadow: 0 0 16px #9c27b0; }
.r5 { box-shadow: 0 0 18px #ff9800; }
.r6 { box-shadow: 0 0 22px gold; }

/* COLLECTION */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
    gap: 10px;
}

.smallCard {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 8px;
    text-align: center;
    background: white;
}

.locked {
    background: #eee;
    color: #aaa;
}

/* ADMIN */
input, select {
    padding: 8px;
    margin: 5px;
}

.adminCard {
    border: 1px solid #ddd;
    padding: 10px;
    margin: 10px;
}
</style>
</head>

<body>

<header>
<button onclick="nav('booster')">Booster</button>
<button onclick="nav('collection')">Collection</button>
<button onclick="nav('admin')">Admin</button>
</header>

<!-- BOOSTER -->
<div id="booster" class="page active">
    <h2>Ouverture de booster</h2>

    <button onclick="openBooster()">Ouvrir booster</button>
    <p id="cooldown"></p>

    <div class="booster-wrap">
        <div class="card-stage">
            <div id="card" class="card">
                <div class="card-face front">CARTE</div>

                <div class="card-face back">
                    <img id="img">
                    <h3 id="name"></h3>
                    <p id="info"></p>
                </div>
            </div>
        </div>

        <button onclick="prev()">◀</button>
        <button onclick="next()">▶</button>
    </div>
</div>

<!-- COLLECTION -->
<div id="collection" class="page">
<h2>Collection</h2>
<div id="grid" class="grid"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>Admin</h2>

<input id="n" placeholder="Nom"><br>
<input id="i" placeholder="Index"><br>

<select id="r">
    <option value="1">Rareté 1</option>
    <option value="2">Rareté 2</option>
    <option value="3">Rareté 3</option>
    <option value="4">Rareté 4</option>
    <option value="5">Rareté 5</option>
    <option value="6">Rareté 6</option>
</select><br>

<input type="file" id="imgFile"><br>

<button onclick="add()">Ajouter carte</button>

<div id="list"></div>
</div>

<script>

let cards = JSON.parse(localStorage.getItem("cards")||"[]");
let col = JSON.parse(localStorage.getItem("col")||"{}");

let booster = [];
let idx = 0;
let last = localStorage.getItem("last")||0;

/* NAV */
function nav(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
render();
adminRender();
}

/* RARETY DROP */
function roll(){
let r = Math.random();
if(r<0.50) return 1;
if(r<0.75) return 2;
if(r<0.88) return 3;
if(r<0.95) return 4;
if(r<0.99) return 5;
return 6;
}

/* BOOSTER */
function openBooster(){

let now = Date.now();
if(now - last < 20000){
document.getElementById("cooldown").innerText =
"Cooldown: " + Math.ceil((20000-(now-last))/1000)+"s";
return;
}

last = now;
localStorage.setItem("last",last);

booster = [];

for(let i=0;i<5;i++){
let rarity = roll();
let pool = cards.filter(c=>c.r==rarity);
if(pool.length){
booster.push(pool[Math.floor(Math.random()*pool.length)]);
}
}

idx = 0;
show(true);
}

/* ANIMATION */
function show(anim=false){

let c = booster[idx];
if(!c) return;

let card = document.getElementById("card");
card.classList.remove("flipped");

setTimeout(()=>{

document.getElementById("img").src = c.img;
document.getElementById("name").innerText = c.n;
document.getElementById("info").innerText =
"#"+c.i+" | Rareté "+c.r;

card.className = "card r"+c.r;

card.classList.add("flipped");

col[c.i]=c;
localStorage.setItem("col",JSON.stringify(col));

},300);
}

function next(){
if(idx<booster.length-1){ idx++; show(); }
}

function prev(){
if(idx>0){ idx--; show(); }
}

/* COLLECTION */
function render(){
let g = document.getElementById("grid");
g.innerHTML="";

cards.forEach(c=>{
let owned = col[c.i];

let div = document.createElement("div");
div.className="smallCard "+(owned?"":"locked");

div.innerHTML = owned ?
`<img src="${c.img}" width="100%"><br>${c.n}` :
`???`;

g.appendChild(div);
});
}

/* ADMIN FIX */
function add(){
let name = document.getElementById("n").value;
let index = document.getElementById("i").value;
let rarity = document.getElementById("r").value;
let file = document.getElementById("imgFile").files[0];

if(!file) return;

let fr = new FileReader();
fr.onload = e=>{

cards.push({
n:name,
i:index,
r:parseInt(rarity),
img:e.target.result
});

localStorage.setItem("cards",JSON.stringify(cards));
adminRender();
};

fr.readAsDataURL(file);
}

/* ADMIN LIST */
function adminRender(){
let d=document.getElementById("list");
d.innerHTML="";

cards.forEach((c,i)=>{
d.innerHTML+=`
<div class="adminCard">
<img src="${c.img}" width="80"><br>
${c.n} | R${c.r} | #${c.i}
<br>
<button onclick="del(${i})">Suppr</button>
</div>`;
});
}

function del(i){
cards.splice(i,1);
localStorage.setItem("cards",JSON.stringify(cards));
adminRender();
}

</script>

</body>
</html>
